 personality_zeriphen_enigmatic_purifiers:0 "Enigmatic Purifiers"
 personality_zeriphen_enigmatic_purifiers_desc:0 "Enigmatic Purifiers are haughty star-dwelling entities who despise organic life and feed off solar energy."
 ZEP_HOSTILE_GREETING_01:0 "The disgusting sight of your form is unbearable to my senses, [From.GetSpeciesName]. Speak now and then begone."
 ZEP_HOSTILE_GREETING_02:0 "You filthy, insignificant [From.GetSpeciesNamePlural] are nothing but a smear on the Galaxy, soon to be cleansed."
 ZEP_HOSTILE_GREETING_03:0 "The day of reckoning shall soon be upon you and all of your kindred, [From.GetSpeciesName]. Mark my words."
 ZEP_DOMINEERING_GREETING_01:0 "You are like a child, [From.GetSpeciesName], yet you expect us to listen when you speak?"
 ZEP_DOMINEERING_GREETING_02:0 "A small smear on the idyllic beauty of the Galaxy such as yourself can easily be cleansed, [From.GetSpeciesName]. Remember this when you address us."
 ZEP_DOMINEERING_GREETING_03:0 "Fear not, [From.GetSpeciesName]. Your time has not yet come. You may still address us in peaceful terms."
 ZEP_NEUTRAL_GREETING_01:0 "Beware, [From.GetSpeciesName]: the eternal eye of the [Root.GetRulerTitle] is upon you."
 ZEP_NEUTRAL_GREETING_02:0 "Speak, insignificant little creature. We will entertain your senseless [From.GetRandomSpeciesSound] for a few moments."
 ZEP_NEUTRAL_GREETING_03:0 "Do not stutter in the glorious presence of the [Root.GetSpeciesNamePlural]."
 ZEP_NEUTRAL_GREETING_04:0 "Our glorious host flies well beyond the limited reach of your form, [From.GetSpeciesName], yet you still talk."
 ZEP_NEUTRAL_GREETING_05:0 "Away with you, primitive mongrel. We have no business to discuss with the likes of you."
 ZEP_THREATENED_GREETING_01:0 "I wonder if your mind is so feeble to make you think you could raise your hand against us and survive, [From.GetSpeciesName]."
 ZEP_THREATENED_GREETING_02:0 "We grow tired of the crass insult represented by your continued existence, [From.GetSpeciesName]. You would do well not to strain our patience any further if you wish for your kind to survive a while longer."
 ZEP_THREATENED_GREETING_03:0 "We shall not be undermined by some primitive flesh-monger, [From.GetSpeciesName]. We would sooner destroy the entire Galaxy than submit to your obscene rule."
 ZEP_FRIENDLY_GREETING_01:0 "Your continued existence has not yet caused offense great enough to the [Root.GetName] to demand your extermination, [From.GetSpeciesName]. Rejoice."
 ZEP_FRIENDLY_GREETING_02:0 "Keep to your current course, [From.GetSpeciesName]. You may yet survive for another era before our reckoning."
 ZEP_FRIENDLY_GREETING_03:0 "You are doing well to not rouse the ire of the [Root.GetRulerTitle], [From.GetSpeciesName]. The continued existence of your pitiful Empire depends on it."
 ZEP_WAR_GREETING_01:0 "There are no words to be exchanged, [From.GetSpeciesName]. Our heavenly hosts will soon wipe your pathetic kind from the face of the Galaxy."
 ZEP_WAR_GREETING_02:0 "You should be honored to be dispatched by our [Root.GetName], [From.GetSpeciesName]. Not many can aspire to such a glorious and enlightened end."
 ZEP_WAR_GREETING_03:0 "Your end is nigh, [Root.GetName]. Your false idols and miserable fleets will not shield you from the awesome might of our heavenly hosts."
 ZEP_VASSAL_GREETING_01:0 "What is your wish, [From.GetRulerTitle]?"
 ZEP_VASSAL_GREETING_02:0 "We stand by your commands, [From.GetRulerTitle]. Which enemies do you wish to see vanquished?"
 ZEP_VASSAL_GREETING_03:0 "Is it time for our heavenly hosts to take flight, [From.GetRulerTitle]?"
 ZEP_DOW_PROPOSE_01:0 "The age of [Root.GetSpeciesNamePlural] is at an end. You may accept your death with dignity or engage in a futile last stand. The result will be the same."
 ZEP_DOW_PROPOSE_02:0 "The [From.GetRulerTitle] has ordered for a great cleansing upon the [From.GetSpeciesAdj] people. Our heavenly hosts shall fly upon your worlds and purify them from the wickedness of your flesh."
 ZEP_DOW_PROPOSE_03:0 "The time has come for this [From.GetSpeciesAdj] infestation to be healed. The [Root.GetRulerTitle] has so decreed: that no [From.GetSpeciesName] nor [From.GetSpeciesSpawnName] be spared."
 ZEP_DOW_PROPOSE_04:0 "Your unholy conduct has incurred in the wrath of the [From.GetName], [Root.GetSpeciesName]. Prepare to be extinguished."
 ZEP_DOW_PROPOSE_05:0 "Prepare yourselves, [Root.GetSpeciesNamePlural]: the time for your species to be purified is at hand."
 01_INSULT_PROPOSE_ZERIPHENS:0 "Pathetic smear of intergalactic dust. You are not worthy of even gazing upon our sacred forms."
 02_INSULT_PROPOSE_ZERIPHENS:0 "Begone from this Galaxy, you insignificant smudge of matter."
 03_INSULT_PROPOSE_ZERIPHENS:0 "Your miserable attempts to preserve this pitiful Empire are doomed to failure, as all things mundane are."
 04_INSULT_PROPOSE_ZERIPHENS:0 "Know that, when the time will come for us to end your species, all of your so-called accomplishments will be but an insignificant dot of imperfection in the eternal harmony of the Galaxy."
 05_INSULT_PROPOSE_ZERIPHENS:0 "Your efforts are meaningless and your results repulsive. End yourselves with dignity before we are forced to sully our lances with your wretched ichor."
 06_INSULT_PROPOSE_ZERIPHENS:0 "Our heavenly hosts sing of your incumbent, inevitable end. All that you are shall soon be undone."
 01_INSULT_ACCEPT_ZERIPHENS:0 "Your insolence shall be your undoing, you repulsive pest."
 02_INSULT_ACCEPT_ZERIPHENS:0 "Do not test our patience. Its borders are what keeps your species from utter annihilation."
 03_INSULT_ACCEPT_ZERIPHENS:0 "Your vulgar antics are of no consequence to us. We are beings of a far higher nature than what lays within your limited understanding."
 04_INSULT_ACCEPT_ZERIPHENS:0 "The time for your species to be cleansed will soon come. Do you long for death so much to taunt us in such manners?"
 