 EMPIRE_DESIGN_zeriphen1:0 "Gates of Elikiol"  
 EMPIRE_DESIGN_zeriphen1_desc:0 "The Zeriphen are enigmatic beings whose origin is unknown. Whether through natural evolution or artificial engineering, these creatures have adapted to survive only near the boiling surface of their home star.\n\nUnable and unwilling to live on the solid surface of the planets around them, the Zeriphen seldom leave the Gates of Elikiol. Yet, when they do, their intentions are never peaceful. Their oligarchic leadership, organized in complex sets of hosts, harbors a deep hatred towards all other living beings, and is all too happy to cleanse any species that is so unlucky as to become their neighbor."
 START_SCREEN_ZERIPHEN:0 "The end of this epoch is upon us. \n\nThe Highest Chorus, vibrant paragon of sublime enlightenment has thus decreed that the Gates will open, and a righteous storm of heavenly hosts will fall upon this unworthy carcass of a Galaxy, and bring an end to the filthy vermin squirming within. \n\nLet there be no quarter and no mercy upon the wicked, let the purest candor of our shrouds be cleansed through this monumental, cosmic bloodletting!"

