 personality_zeriphen_enigmatic_purifiers:0 "Загадочные очистители"
 personality_zeriphen_enigmatic_purifiers_desc:0 "Загадочные очистители - надменные звездные сущности, презирающие органическую жизнь и питающиеся солнечной энергией."
 ZEP_HOSTILE_GREETING_01:0 "Отвратительное зрелище вашего облика невыносимо для моих чувств, [From.GetSpeciesName]. Говорите и убирайтесь."
 ZEP_HOSTILE_GREETING_02:0 "Вы, грязные и ничтожные [From.GetSpeciesNamePlural], всего лишь пятно на теле Галактики, которое вскоре будет очищено."
 ZEP_HOSTILE_GREETING_03:0 "Скоро вас и весь ваш род настигнет день расплаты, [From.GetSpeciesName]. Запомните мои слова."
 ZEP_DOMINEERING_GREETING_01:0 "Вы как дитя, [From.GetSpeciesName], и все же ждете, что мы станем вас слушать?"
 ZEP_DOMINEERING_GREETING_02:0 "Такое мелкое пятно на идиллической красоте Галактики, как вы, можно легко стереть, [From.GetSpeciesName]. Помните об этом, обращаясь к нам."
 ZEP_DOMINEERING_GREETING_03:0 "Не бойтесь, [From.GetSpeciesName]. Ваш срок еще не настал. Пока вы еще можете говорить с нами о мире."
 ZEP_NEUTRAL_GREETING_01:0 "Берегитесь, [From.GetSpeciesName]: вечное око [Root.GetRulerTitle] взирает на вас."
 ZEP_NEUTRAL_GREETING_02:0 "Говорите, ничтожное создание. Еще несколько мгновений мы потерпим ваше бессмысленное [From.GetRandomSpeciesSound]."
 ZEP_NEUTRAL_GREETING_03:0 "Не запинайтесь в блистательном присутствии [Root.GetSpeciesNamePlural]."
 ZEP_NEUTRAL_GREETING_04:0 "Наш славный сонм парит далеко за пределами досягаемости вашего ничтожного облика, [From.GetSpeciesName], и все же вы продолжаете говорить."
 ZEP_NEUTRAL_GREETING_05:0 "Прочь, примитивное отродье. Нам не о чем говорить с подобными вам."
 ZEP_THREATENED_GREETING_01:0 "Мне даже любопытно, настолько ли слаб ваш разум, что вы вообразили, будто сможете поднять на нас руку и уцелеть, [From.GetSpeciesName]."
 ZEP_THREATENED_GREETING_02:0 "Нам наскучило грубое оскорбление, воплощенное в самом факте вашего существования, [From.GetSpeciesName]. Не истощайте наше терпение, если хотите, чтобы ваш род прожил еще немного."
 ZEP_THREATENED_GREETING_03:0 "Нас не подточит какой-то примитивный торгаш плотью, [From.GetSpeciesName]. Мы скорее уничтожим всю Галактику, чем покоримся вашей омерзительной власти."
 ZEP_FRIENDLY_GREETING_01:0 "Ваше дальнейшее существование еще не оскорбило [Root.GetName] настолько, чтобы потребовать вашего истребления, [From.GetSpeciesName]. Радуйтесь."
 ZEP_FRIENDLY_GREETING_02:0 "Держитесь нынешнего курса, [From.GetSpeciesName]. Быть может, вы переживете еще одну эпоху до нашего часа расплаты."
 ZEP_FRIENDLY_GREETING_03:0 "Вы благоразумны, не навлекая на себя гнев [Root.GetRulerTitle], [From.GetSpeciesName]. От этого зависит дальнейшее существование вашей жалкой империи."
 ZEP_WAR_GREETING_01:0 "Здесь больше нечего говорить, [From.GetSpeciesName]. Наши небесные воинства скоро сотрут ваш жалкий род с лика Галактики."
 ZEP_WAR_GREETING_02:0 "Почтите за честь пасть от руки [Root.GetName], [From.GetSpeciesName]. Немногим доводится удостоиться столь славного и просветленного конца."
 ZEP_WAR_GREETING_03:0 "Ваш конец близок, [Root.GetName]. Ваши ложные идолы и жалкие флотилии не укроют вас от грозной мощи наших небесных воинств."
 ZEP_VASSAL_GREETING_01:0 "Какова ваша воля, [From.GetRulerTitle]?"
 ZEP_VASSAL_GREETING_02:0 "Мы внемлем вашим приказам, [From.GetRulerTitle]. Каких врагов вы желаете увидеть поверженными?"
 ZEP_VASSAL_GREETING_03:0 "Не настал ли час нашим небесным воинствам взмыть в полет, [From.GetRulerTitle]?"
 ZEP_DOW_PROPOSE_01:0 "Век [Root.GetSpeciesNamePlural] подошел к концу. Вы можете принять смерть с достоинством или вступить в бесплодный последний бой. Исход будет одинаков."
 ZEP_DOW_PROPOSE_02:0 "По велению [From.GetRulerTitle] великий обряд очищения падет на народ [From.GetSpeciesAdj]. Наши небесные воинства низойдут на ваши миры и очистят их от скверны вашей плоти."
 ZEP_DOW_PROPOSE_03:0 "Настало время исцелить эту [From.GetSpeciesAdj] заразу. [Root.GetRulerTitle] постановил: не щадить ни [From.GetSpeciesName], ни [From.GetSpeciesSpawnName]."
 ZEP_DOW_PROPOSE_04:0 "Ваше нечестивое поведение навлекло на вас гнев [From.GetName], [Root.GetSpeciesName]. Готовьтесь угаснуть."
 ZEP_DOW_PROPOSE_05:0 "Готовьтесь, [Root.GetSpeciesNamePlural]: час очищения вашего вида близок."
 01_INSULT_PROPOSE_ZERIPHENS:0 "Жалкое пятно межгалактической пыли. Вы недостойны даже взирать на наши священные облики."
 02_INSULT_PROPOSE_ZERIPHENS:0 "Прочь из этой Галактики, ничтожное пятно материи."
 03_INSULT_PROPOSE_ZERIPHENS:0 "Ваши жалкие попытки сохранить эту убогую империю обречены на крах, как и все мирское."
 04_INSULT_PROPOSE_ZERIPHENS:0 "Знайте: когда придет час положить конец вашему виду, все ваши так называемые достижения окажутся лишь ничтожной точкой несовершенства в вечной гармонии Галактики."
 05_INSULT_PROPOSE_ZERIPHENS:0 "Ваши усилия тщетны, а их плоды отвратительны. Покончите с собой с достоинством, пока нам не пришлось пятнать наши копья вашим мерзким ихором."
 06_INSULT_PROPOSE_ZERIPHENS:0 "Наши небесные воинства уже воспевают ваш скорый и неизбежный конец. Все, чем вы являетесь, вскоре будет обращено в ничто."
 01_INSULT_ACCEPT_ZERIPHENS:0 "Ваша дерзость станет вашей погибелью, мерзкий паразит."
 02_INSULT_ACCEPT_ZERIPHENS:0 "Не испытывайте наше терпение. Лишь его пределы пока оберегают ваш вид от полного уничтожения."
 03_INSULT_ACCEPT_ZERIPHENS:0 "Ваши пошлые выходки ничего для нас не значат. Мы существа куда более высокой природы, чем способно постичь ваше ограниченное сознание."
 04_INSULT_ACCEPT_ZERIPHENS:0 "Скоро придет час очистить ваш вид. Неужели вы так жаждете смерти, что дерзаете дразнить нас подобным образом?"
 