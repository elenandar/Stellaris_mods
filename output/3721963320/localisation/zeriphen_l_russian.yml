 EMPIRE_DESIGN_zeriphen1:0 "Врата Эликиола"  
 EMPIRE_DESIGN_zeriphen1_desc:0 "Зерифены - загадочные существа, чье происхождение неведомо. Возникли ли они в результате естественной эволюции или были созданы искусственно, эти создания приспособились выживать лишь вблизи кипящей поверхности своей родной звезды.\n\nНе способные и не желающие жить на твердой поверхности окружающих их планет, зерифены редко покидают Врата Эликиола. Но если они все же выходят за их пределы, их намерения никогда не бывают мирными. Их олигархическое правление, выстроенное в сложные сонмы воинств, питает глубокую ненависть ко всем прочим живым существам и с готовностью очистит любой вид, которому не повезло стать их соседом."
 START_SCREEN_ZERIPHEN:0 "Конец этой эпохи близок.\n\nВысший Хор, сияющее воплощение высшего просветления, постановил открыть Врата, дабы праведная буря небесных воинств обрушилась на эту недостойную тушу Галактики и положила конец грязным паразитам, что копошатся внутри.\n\nДа не будет пощады и милосердия нечестивым; да очистится чистейшая ясность наших покровов этим грандиозным космическим кровопусканием!"

 ZERIP_defarmy:0 "$ORD$ Хоровые стражи"
