 ZERIP_machineassaultarmy:0 "$ORD$ Бездушный нимб"
 ZERIP_androidarmy:0 "$ORD$ Наземные дроны"
 ZERIP_psionarmy:0 "$ORD$ Серафимы"
 ZERIP_undeadarmy:0 "$ORD$ Бессмертный легион"
 ZERIP_xenoarmy:0 "$ORD$ Начала"
